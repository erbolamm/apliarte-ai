<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Fondo redondeado -->
  <rect width="128" height="128" rx="20" ry="20" fill="#303030"/>

  <!-- Chevron superior (celeste claro) -->
  <polyline points="24,62 58,20 92,62" fill="none" stroke="#7DD3FC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chevron inferior (azul oscuro) -->
  <polyline points="24,82 58,40 78,64" fill="none" stroke="#0369A1" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chat bubble -->
  <rect x="68" y="68" width="40" height="28" rx="8" ry="8" fill="white"/>
  <polygon points="78,96 72,108 86,96" fill="white"/>

  <!-- Tres puntos -->
  <circle cx="78" cy="82" r="3.5" fill="#303030"/>
  <circle cx="88" cy="82" r="3.5" fill="#303030"/>
  <circle cx="98" cy="82" r="3.5" fill="#303030"/>
</svg>
